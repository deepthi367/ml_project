<!DOCTYPE html>
<html>
<head>
    <title>ML Prediction App</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
        }
        .card {
            border-radius: 15px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
        }
        h2 {
            font-weight: bold;
            color: #333;
        }
    </style>
</head>

<body class="container mt-5">

    <h2 class="text-center mb-4">ML Prediction App</h2>

    <div class="card p-4">

        <form action="/predict" method="post">
            <div class="row">

                <div class="col-md-6 mb-3">
    <input type="number" step="any" name="f1" class="form-control"
           placeholder="Respiratory Rate"
           value="{{ values.f1 if values else '' }}" required>
</div>

<div class="col-md-6 mb-3">
    <input type="number" step="any" name="f2" class="form-control"
           placeholder="C-Reactive Proteins"
           value="{{ values.f2 if values else '' }}" required>
</div>

<div class="col-md-6 mb-3">
    <input type="number" step="any" name="f3" class="form-control"
           placeholder="Age"
           value="{{ values.f3 if values else '' }}" required>
</div>

<div class="col-md-6 mb-3">
    <input type="number" step="any" name="f4" class="form-control"
           placeholder="Potassium"
           value="{{ values.f4 if values else '' }}" required>
</div>

<div class="col-md-6 mb-3">
    <input type="number" step="any" name="f5" class="form-control"
           placeholder="Respiratory Findings"
           value="{{ values.f5 if values else '' }}" required>
</div>

<div class="col-md-6 mb-3">
    <input type="number" step="any" name="f6" class="form-control"
           placeholder="SGOT"
           value="{{ values.f6 if values else '' }}" required>
</div>

<div class="col-md-6 mb-3">
    <input type="number" step="any" name="f7" class="form-control"
           placeholder="Diabetes Mellitus"
           value="{{ values.f7 if values else '' }}" required>
</div>

<div class="col-md-6 mb-3">
    <input type="number" step="any" name="f8" class="form-control"
           placeholder="Hemoglobin"
           value="{{ values.f8 if values else '' }}" required>
</div>

<div class="col-md-6 mb-3">
    <input type="number" step="any" name="f9" class="form-control"
           placeholder="BMI"
           value="{{ values.f9 if values else '' }}" required>
</div>

<div class="col-md-6 mb-3">
    <input type="number" step="any" name="f10" class="form-control"
           placeholder="Sodium"
           value="{{ values.f10 if values else '' }}" required>
</div>
            </div>
            <button type="submit" class="btn btn-success">Predict</button>
        </form>
    </div>
          
        {% if prediction is not none %}
    <div class="alert alert-info text-center mt-4">
        <h4>Prediction: {{ prediction }}</h4>
    </div>
{% endif %}
    </div>

</body>
</html>
